<!DOCTYPE html>
<html lang="vi">
<head>
    <meta property="og:title" content="Dashboard Cụm Savico">
    <meta name="description" content="Dashboard Báo Cáo Cụm Savico">
  <meta charset="UTF-8">
  <title>Báo Cáo Nhân Viên - Cụm Savico</title>
  <script src="shared_config.js"></script>
  <script src="html-to-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Montserrat:wght@600;800;900&family=Nunito:wght@600;700;800;900&display=swap');
    
    :root {
        --bg-body: #eef2f7;
        --bg-panel: #ffffff;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --border-color: transparent;
        --neumorphic-outset: 0 0 20px rgba(163, 177, 198, 0.45), 0 4px 8px rgba(163, 177, 198, 0.2);
        --neumorphic-inset: inset 0 0 10px rgba(163, 177, 198, 0.35), inset 0 2px 4px rgba(163, 177, 198, 0.15);
        
        --primary-gradient: linear-gradient(135deg, #0ea5e9, #0284c7);
        --teal-gradient: linear-gradient(135deg, #10b981, #059669);
        --coral-gradient: linear-gradient(135deg, #ff8a9f, #f43f5e);
        
        --bg-badge-stable: rgba(14, 165, 233, 0.15);
        --color-badge-stable: #0284c7;
        --border-table: rgba(148, 163, 184, 0.35);
    }

    [data-theme="dark"] {
        --bg-body: #1e222b;
        --bg-panel: #1e222b;
        --text-main: #f3f4f6;
        --text-muted: #9ca3af;
        --border-color: transparent;
        --neumorphic-outset: 0 0 20px rgba(0, 0, 0, 0.55), 0 4px 8px rgba(0, 0, 0, 0.35);
        --neumorphic-inset: inset 0 0 10px rgba(0, 0, 0, 0.45), inset 0 2px 4px rgba(0, 0, 0, 0.25);
        
        --bg-badge-stable: rgba(56, 189, 248, 0.15);
        --border-table: rgba(156, 163, 175, 0.35);
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .4; }
    }
    .skeleton {
        animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite !important;
        background-color: var(--bg-body) !important;
        border: none !important;
        box-shadow: none !important;
    }
    .skeleton-title {
        height: 24px;
        margin-bottom: 12px;
        width: 60%;
        background-color: rgba(148, 163, 184, 0.2);
        border-radius: 6px;
        display: inline-block;
    }
    .skeleton-text {
        height: 16px;
        margin-bottom: 8px;
        width: 100%;
        background-color: rgba(148, 163, 184, 0.15);
        border-radius: 4px;
        display: inline-block;
    }

    body {
        font-family: 'Inter', sans-serif;
        background: var(--bg-body);
        color: var(--text-main);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        margin: 0;
        transition: background 0.3s, color 0.3s;
    }
    
    .report-box { 
      background: var(--bg-panel);
      width: 950px;
      padding: 30px;
      border-radius: 24px; 
      border: none;
      position: relative;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: var(--neumorphic-outset);
    }

    /* HEADER */
    .header-title { text-align: center; color: var(--text-main); font-family: 'Montserrat', sans-serif; font-size: 36px; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; }
    .date-text { text-align: center; font-weight: 800; color: #ff8a9f; font-size: 18px; margin-bottom: 20px; text-transform: uppercase;}
    
    /* 1. HEALTH BAR */
    .status-bar { display: flex; align-items: stretch; border: none; border-radius: 16px; margin-bottom: 25px; overflow: hidden; background: var(--bg-panel); box-shadow: var(--neumorphic-outset); }
    .sb-item { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 12px 5px; flex: 1; position: relative;}
    .sb-item:not(:nth-last-child(2))::after { content: ''; position: absolute; right: 0; top: 15%; height: 70%; width: 1px; background: rgba(148, 163, 184, 0.12); }
    
    .sb-left { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 12px; flex: 1.4; padding: 10px 15px; }
    .sb-left-icon { font-size: 32px; background: var(--bg-panel); width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; border-radius: 12px; border: none; box-shadow: var(--neumorphic-inset); }
    .sb-right { background: var(--bg-badge-stable); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--color-badge-stable); flex: 0.9; padding: 10px;}
    
    .sb-label { font-size: 11px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; display: flex; align-items: center; justify-content: center; gap: 6px; text-align: center;}
    .sb-val { font-size: 24px; font-weight: 900; color: var(--text-main); line-height: 1; text-align: center; }

    /* SECTION TITLES */
    .sec-title { display: flex; align-items: center; font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 900; color: var(--text-main); margin: 25px 0 10px 0; text-transform: uppercase; }
    .sec-title span { background: var(--primary-gradient); color: white; width: 34px; height: 34px; display: inline-flex; justify-content: center; align-items: center; border-radius: 50%; margin-right: 12px; font-size: 20px; }

    /* KPI TIERS */
    .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; row-gap: 16px; margin-bottom: 25px;}
    .card { background: var(--bg-panel); padding: 12px 6px; text-align: center; border: none; border-radius: 16px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: var(--neumorphic-outset);}
    .card-title { font-size: 13px; font-weight: 900; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; display: flex; justify-content: center; align-items: center; gap: 6px; }
    .card-val { font-size: 30px; font-family: 'Montserrat', sans-serif; font-weight: 900; line-height: 1.1; margin: 0; color: var(--text-main); }
    .card-sub { font-size: 12px; font-weight: 800; color: var(--text-muted); margin-top: 8px; display: block; }
    
    .highlight-target { 
        background-color: var(--bg-panel); color: var(--text-main); padding: 4px 0px; border-radius: 8px; 
        border: none; font-weight: 800; display: flex; justify-content: center; align-items: center; margin: 0 auto;
        text-align: center; width: 85%; box-shadow: var(--neumorphic-inset); min-height: 24px;
    }

    /* BẢNG CHUNG */
    .table-container { border: none; border-radius: 16px; overflow: hidden; background: var(--bg-panel); margin-top: 10px; box-shadow: var(--neumorphic-outset); }
    table { width: 100%; border-collapse: collapse; background: var(--bg-panel); table-layout: fixed;}
    
    th { background: var(--bg-panel); color: var(--text-muted); padding: 12px 2px; font-size: 14px; font-weight: 900; border-bottom: 2px solid var(--border-table) !important; border-right: 1.5px solid var(--border-table) !important; text-align: center; text-transform: uppercase; }
    th:last-child { border-right: none !important; }
    
    td { position: relative; padding: 6px 2px; text-align: center; font-size: 24px; font-weight: 900; color: var(--text-main); border-bottom: 1.5px solid var(--border-table) !important; border-right: 1.5px solid var(--border-table) !important; vertical-align: middle; }
    td:last-child { border-right: none !important; }
    tr:last-child td { border-bottom: none !important; }
    
    .text-left { text-align: left; padding-left: 10px !important; font-size: 14px !important; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; color: var(--text-main); }

    /* Progress UI */
    .td-prog-container { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 100%; padding: 0 5px; box-sizing: border-box;}
    .td-prog-bar-bg { width: 90%; height: 8px; background: var(--bg-body); border-radius: 4px; overflow: hidden; border: none; box-shadow: var(--neumorphic-inset); }
    .td-prog-bar-fill { height: 100%; border-radius: 4px; }
    
    .cell-prog-wrap { position: relative; width: 100%; height: 100%; min-height: 55px; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 4px;}
    .cell-prog-bg { position: absolute; left: 0; top: 0; bottom: 0; z-index: 0; opacity: 0.15; }
    .cell-val { position: relative; z-index: 1; }

    /* BẢNG TODO (VIỆC CẦN LÀM HÔM NAY) */
    .todo-board { border: none; border-radius: 16px; overflow: hidden; margin-bottom: 20px; background: var(--bg-panel); box-shadow: var(--neumorphic-outset); }
    .todo-header { background: var(--primary-gradient); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: none;}
    .todo-header-left { font-size: 18px; font-weight: 900; color: #ffffff; display: flex; align-items: center; gap: 8px; }
    .todo-header-right { background: rgba(255, 255, 255, 0.2); color: white; padding: 6px 14px; border-radius: 12px; font-size: 13px; font-weight: 900; }
    
    .todo-list { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; grid-auto-flow: column; gap: 14px; padding: 14px; background: var(--bg-panel); }
    .todo-item { display: flex; flex-direction: column; padding: 12px; border: none; background: var(--bg-panel); border-radius: 16px; gap: 10px; box-shadow: var(--neumorphic-outset);}
    .todo-top { display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(148, 163, 184, 0.12); padding-bottom: 8px;}
    .todo-stt { color: white; width: 28px; height: 28px; display: flex; justify-content: center; align-items: center; font-weight: 900; border-radius: 8px; font-size: 16px; flex-shrink: 0;}
    .todo-name { font-size: 18px; font-weight: 900; color: var(--text-main); text-transform: uppercase; line-height: 1.3; flex: 1;}
    .todo-tag { background: #dcfce7; color: #16a34a; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 900; }
    
    /* Box Summary Thi Đua */
    .td-summary-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; margin-bottom: 20px; }
    .td-main-box { border: none; border-radius: 16px; background: var(--bg-panel); box-shadow: var(--neumorphic-outset); overflow: hidden; display: flex; flex-direction: column;}
    .td-main-box-title { background: var(--bg-panel); padding: 12px 10px; text-align: center; font-size: 15px; font-weight: 900; color: var(--text-muted); border-bottom: 1px solid rgba(148, 163, 184, 0.12); text-transform: uppercase;}
    .td-sub-cards { display: flex; padding: 14px; gap: 12px; justify-content: space-around; flex: 1; align-items: center; background: var(--bg-panel);}
    .td-sum-card-new { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; background: var(--bg-panel); padding: 10px 4px; border-radius: 12px; border: none; box-shadow: var(--neumorphic-inset);}
    .td-sum-card-title-new { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 800; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase;}
    .td-sum-card-val-new { font-size: 26px; font-weight: 900; line-height: 1; color: var(--text-main); }

    .stt-pill { width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 900; font-size: 18px; margin: 0 auto; border: 1px solid rgba(148, 163, 184, 0.12);}
    .stt-gold { background: #fef08a; color: #b45309; border-color: #facc15; }
    .stt-silver { background: #e2e8f0; color: #475569; border-color: #cbd5e1; }
    .stt-bronze { background: #ffedd5; color: #9a3412; border-color: #fdba74; }
    .stt-normal { background: var(--bg-panel); color: var(--text-muted); box-shadow: var(--neumorphic-inset); }
    
    .eval-badge { padding: 4px 8px; border-radius: 6px; font-size: 14px; font-weight: 900; display: inline-block; white-space: nowrap;}

    .footer { text-align: center; margin-top: 25px; font-size: 14px; color: var(--text-muted); font-weight: bold; text-transform: uppercase; }
    
    .btn-send {
        background: var(--primary-gradient);
        color: #ffffff;
        border: none;
        padding: 15px 30px;
        font-size: 18px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 800;
        margin-bottom: 30px;
        font-family: 'Inter', sans-serif;
        box-shadow: var(--neumorphic-outset);
        transition: all 0.2s;
    }
    .btn-send:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(148, 163, 184, 0.15);
    }
    .btn-send:active {
        box-shadow: var(--neumorphic-inset);
    }
    
    /* UNIFIED CONTROL CENTER PANEL */
    .control-panel {
        background: var(--bg-panel);
        border-radius: 20px;
        padding: 16px 20px;
        box-shadow: var(--neumorphic-outset);
        max-width: 1010px;
        width: 100%;
        margin: 20px auto;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 12px;
        transition: all 0.3s ease;
    }
    .cp-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
    }
    .cp-group {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
    }
    .cp-label {
        font-size: 11px;
        font-weight: 900;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-right: 4px;
        display: flex;
        align-items: center;
        gap: 4px;
    }
    .cp-divider {
        height: 1px;
        background: rgba(148, 163, 184, 0.12);
        width: 100%;
    }
    .control-panel select {
        border: none;
        border-radius: 10px;
        padding: 6px 12px;
        font-family: 'Inter', 'Nunito', sans-serif;
        font-weight: 800;
        font-size: 12px;
        outline: none;
        background: var(--bg-body);
        color: var(--text-main);
        box-shadow: var(--neumorphic-inset);
        cursor: pointer;
        transition: all 0.2s;
    }
    .cp-btn {
        background: var(--bg-panel);
        border: none;
        color: var(--text-main);
        padding: 8px 14px;
        font-size: 11px;
        border-radius: 10px;
        font-weight: 800;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        font-family: 'Inter', 'Nunito', sans-serif;
        box-shadow: var(--neumorphic-outset);
        transition: all 0.2s ease;
        white-space: nowrap;
    }
    .cp-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 10px rgba(148, 163, 184, 0.15);
    }
    .cp-btn:active {
        box-shadow: var(--neumorphic-inset);
        transform: translateY(1px);
    }
    .cp-btn-primary {
        background: var(--primary-gradient);
        color: white;
        box-shadow: var(--neumorphic-outset);
    }
    .cp-btn-primary:hover {
        box-shadow: 0 4px 12px rgba(14, 165, 233, 0.25);
    }
    .cp-btn-success {
        color: #10b981;
    }
    .cp-btn-warning {
        color: #f39c12;
    }
    .cp-btn-teal {
        color: #0d9488;
    }
    .cp-btn-coral {
        color: #f43f5e;
    }
    


    /* Part 3 Redesign */
    .perf-card {
        background: var(--bg-panel); border: none; border-radius: 16px; overflow: hidden;
        box-shadow: var(--neumorphic-outset); width: 100%;
    }
    .perf-header {
        padding: 8px 10px; display: flex; align-items: center; color: var(--text-main); position: relative;
    }
    .perf-avatar {
        width: 35px; height: 35px; border-radius: 50%; background: var(--bg-panel); border: none;
        display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px;
        box-shadow: var(--neumorphic-inset); margin-right: 10px; flex-shrink: 0; color: var(--text-main);
    }
    .perf-header-info { flex: 1; min-width: 0; }
    .perf-name { font-size: 13px; font-weight: 900; margin: 0; color: inherit; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .perf-status-msg { font-size: 9px; font-weight: 700; opacity: 0.9; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .perf-rank-box { text-align: right; flex-shrink: 0; }
    .perf-rank-text { font-size: 11px; font-weight: 900; display: block; }
    .perf-score-text { font-size: 9px; font-weight: 800; opacity: 0.8; }

    .perf-progress-sec { padding: 8px 10px; border-bottom: 1px solid rgba(148, 163, 184, 0.12); }
    .perf-progress-item { margin-bottom: 6px; }
    .perf-progress-label { display: flex; justify-content: space-between; font-size: 9px; font-weight: 800; margin-bottom: 2px; }
    .perf-progress-bar-bg { height: 5px; background: var(--bg-body); border-radius: 3px; overflow: hidden; border: none; box-shadow: var(--neumorphic-inset); }
    .perf-progress-bar-fill { height: 100%; border-radius: 3px; }

    .perf-chips-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 10px; }
    .perf-chip { 
        padding: 5px 2px;
        border-radius: 8px;
        text-align: center;
        background: var(--bg-panel);
        color: var(--text-main);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-shadow: var(--neumorphic-outset);
        border: none;
        box-sizing: border-box;
    }
    .perf-chip-label { font-size: 8px; font-weight: 900; color: var(--text-muted); margin-bottom: 2px; text-transform: uppercase; white-space: nowrap; }
    .perf-chip-val { font-size: 10px; font-weight: 900; }

    .perf-table-sec { padding: 0 4px 10px 4px; }
    .perf-table { width: 100%; border-collapse: collapse; font-size: 9px !important; table-layout: fixed; }
    .perf-table th { background: var(--bg-panel); color: var(--text-muted); padding: 4px 1px; border: 1px solid rgba(148, 163, 184, 0.12); font-weight: 900 !important; text-transform: uppercase; font-size: 8px !important; }
    .perf-table td { padding: 4px 1px; border: 1px solid rgba(148, 163, 184, 0.12); text-align: center; font-weight: 700 !important; color: var(--text-main); overflow: hidden; font-size: 9px !important; line-height: 1.1; background: var(--bg-panel); }
    .perf-table tr:nth-child(even) { background: rgba(148, 163, 184, 0.04); }
    .perf-table .text-left { text-align: left; padding-left: 2px !important; white-space: normal; line-height: 1.1; font-size: 8px !important; }
    .perf-table .highlight { color: #0ea5e9; }

    #part1:fullscreen {
        width: 100vw !important;
        height: 100vh !important;
        border-radius: 0 !important;
        overflow: hidden !important;
        background: var(--bg-body) !important;
        margin: 0 !important;
        padding: 10px !important;
        box-sizing: border-box !important;
    }
    #part1::backdrop {
        background: var(--bg-body);
    }
  
    .delta-badge {
        font-size: 11px; font-weight: 900; padding: 2px 4px; border-radius: 4px; margin-left: 6px; display: inline-block; white-space: nowrap;
    }
    .delta-badge.pos { background: #dcfce7; color: #16a34a; }
    .delta-badge.neg { background: #fee2e2; color: #dc2626; }
    
    body.hide-delta .delta-badge { display: none !important; }

    /* TAB NAVIGATION SYSTEM - PREMIUM MODULAR SEGMENTED CONTROLS */
    .top-nav-container {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        margin: 15px auto 25px auto;
        max-width: 1010px;
        width: 100%;
        box-sizing: border-box;
        background: var(--bg-panel);
        border-radius: 20px;
        box-shadow: var(--neumorphic-outset);
        padding: 8px 12px;
        gap: 6px;
        position: relative;
        font-family: 'Inter', 'Nunito', sans-serif;
        transition: all 0.3s ease;
    }
    .top-nav-container a {
        text-decoration: none;
        padding: 10px 18px;
        font-weight: 800;
        font-size: 12px;
        color: var(--text-muted);
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        gap: 8px;
        border-radius: 12px;
        position: relative;
        letter-spacing: 0.3px;
    }
    .top-nav-container a:hover {
        color: var(--text-main);
        background: rgba(148, 163, 184, 0.08);
        transform: translateY(-1px);
    }
    .top-nav-container a.active-tab {
        color: white !important;
        background: linear-gradient(135deg, #0ea5e9, #0284c7);
        font-weight: 900 !important;
        box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
    }
    .top-nav-container a.active-tab::after {
        display: none !important;
    }
    #btnReloadTop,
    #btnThemeTop,
    #theme-icon-btn {
        position: absolute !important;
        height: 38px;
        padding: 0 16px !important;
        border-radius: 12px !important;
        font-weight: 800 !important;
        font-size: 11px !important;
        letter-spacing: 0.3px;
        font-family: 'Inter', 'Nunito', sans-serif !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        box-shadow: var(--neumorphic-outset) !important;
        border: none !important;
        cursor: pointer !important;
        background: var(--bg-panel) !important;
        color: var(--text-main) !important;
        transition: all 0.2s ease !important;
    }
    #btnReloadTop {
        right: 68px !important;
    }
    #btnThemeTop,
    #theme-icon-btn {
        right: 12px !important;
        width: 44px !important;
        padding: 0 !important;
    }
    #btnReloadTop:hover,
    #btnThemeTop:hover,
    #theme-icon-btn:hover {
        transform: translateY(-1px) !important;
        box-shadow: 0 4px 10px rgba(148, 163, 184, 0.15) !important;
    }
    #btnReloadTop:active,
    #btnThemeTop:active,
    #theme-icon-btn:active {
        transform: translateY(1px) !important;
        box-shadow: var(--neumorphic-inset) !important;
    }

    /* Dark mode overrides */
    [data-theme="dark"] select,
    [data-theme="dark"] input {
        background-color: var(--bg-panel) !important;
        color: var(--text-main) !important;
        border-color: rgba(255, 255, 255, 0.12) !important;

  <script>
    const today = new Date();

    const GAS_URL = "https://script.google.com/macros/s/AKfycbxjTGuxxRiX1zY78pRkZ55qhJQF5om1Vht_kC3exy5JsYVBwjH1u7G2crr6dwbFz0lj/exec";

    const parseVnNumber = (val) => {
      if (val == null || val === '') return 0;
      if (typeof val === 'number') return val; 
      let str = String(val).trim().replace(/\s/g, ''); 
      if (str.includes(',') && str.includes('.')) {
          str = (str.lastIndexOf(',') > str.lastIndexOf('.')) ? str.replace(/\./g, '').replace(',', '.') : str.replace(/,/g, '');
      } else if (str.includes(',')) { str = str.replace(',', '.'); }
      let num = parseFloat(str); return isNaN(num) ? 0 : num;
    };
    const formatMoney = (val) => Math.round(val).toLocaleString('vi-VN'); 
    const formatPercent = (val) => (val * 100).toLocaleString('vi-VN', {minimumFractionDigits: 1, maximumFractionDigits: 1}) + '%';
    const getKey = (obj, ...names) => { let keys = Object.keys(obj); for(let n of names){ let m = keys.find(k=>k.trim().toLowerCase()===n.toLowerCase()); if(m) return obj[m]; } return undefined; };

    const getColorClass = (percent) => {
        if (percent >= 1) return "#10b981"; 
        if (percent >= 0.8) return "#3b82f6"; 
        if (percent >= 0.5) return "#f59e0b"; 
        return "#ef4444"; 
    };

    function getEmoji(name) {
        let n = String(name).toUpperCase();
        if (n.includes("QUẠT")) return "🎐";
        if (n.includes("ĐIỆN TỬ") || n.includes("TIVI") || n.includes("SONY")) return "📺";
        if (n.includes("GIẶT") || n.includes("SẤY")) return "🧺";
        if (n.includes("PIN") || n.includes("SẠC")) return "🔋";
        if (n.includes("LAPTOP")) return "💻";
        if (n.includes("TỦ LẠNH") || n.includes("ĐÔNG") || n.includes("MÁT")) return "❄️";
        if (n.includes("KHÔNG KHÍ") || n.includes("MLKK")) return "🌀";
        if (n.includes("LỌC") || n.includes("NƯỚC") || n.includes("MLN")) return "🚰";
        if (n.includes("GIA DỤNG")) return "🍳";
        if (n.includes("ĐIỆN THOẠI") || n.includes("SMARTPHONE") || n.includes("PHONE") || n.includes("FLAGSHIP")) return "📱";
        if (n.includes("CAMERA")) return "📷";
        if (n.includes("MÁY LẠNH") || n.includes("ĐIỀU HÒA") || n.includes("LẠNH ĐẶC QUYỀN")) return "🌡️";
        if (n.includes("ĐỒNG HỒ") || n.includes("THỜI TRANG")) return "⌚";
        if (n.includes("BẢO HIỂM") || n.includes("FINANCE") || n.includes("CREDIT") || n.includes("VÍ") || n.includes("CAKE") || n.includes("HC")) return "💳";
        if (n.includes("SIM")) return "📶";
        if (n.includes("PHỤ KIỆN")) return "🎧";
        return "📦";
    }

    const setText = (id, val) => { const el = document.getElementById(id); if(el) el.innerText = val; };
    const setHTML = (id, val) => { const el = document.getElementById(id); if(el) el.innerHTML = val; };
    const setColor = (id, val) => { const el = document.getElementById(id); if(el) el.style.color = val; };
    const setBg = (id, val) => { const el = document.getElementById(id); if(el) el.style.background = val; };

    function openModal(title, htmlContent) {
        const m = document.getElementById('infoModal');
        const b = document.getElementById('infoModalContentBox');
        document.getElementById('infoModalTitle').innerHTML = title;
        document.getElementById('infoModalBody').innerHTML = htmlContent;
        m.style.display = 'flex';
        setTimeout(() => { m.style.opacity = '1'; b.style.transform = 'translateY(0)'; }, 10);
    }
    
    function closeModal() {
        const m = document.getElementById('infoModal');
        const b = document.getElementById('infoModalContentBox');
        m.style.opacity = '0';
        b.style.transform = 'translateY(-20px)';
        setTimeout(() => { m.style.display = 'none'; }, 300);
    }

    
    // --- HISTORY & COMPARISON LOGIC ---
    window.availableDates = [];
    window.historyDataCache = {};
    window.showDelta = true;

    window.toggleDelta = function() {
        window.showDelta = !window.showDelta;
        const btn = document.getElementById('btnToggleDelta');
        if (btn) btn.innerHTML = window.showDelta ? "👀 ẨN CHÊNH LỆCH" : "👀 HIỆN CHÊNH LỆCH";
        document.body.classList.toggle('hide-delta', !window.showDelta);
    };

    window.formatDelta = function(val, isSL) {
        if (val === 0 || !val) return "";
        let absVal = Math.abs(val);
        let strVal = isSL ? Math.round(absVal).toLocaleString('vi-VN') : (absVal >= 1000000 ? (absVal/1000000).toLocaleString('vi-VN', {maximumFractionDigits:1}) + 'M' : formatMoney(absVal));
        if (val > 0) return `<span class="delta-badge pos" style="font-size:9px;">▲ +${strVal}</span>`;
        return `<span class="delta-badge neg" style="font-size:9px;">▼ -${strVal}</span>`;
    };

    window.formatScoreDelta = function(val, isSL) {
        if (val === 0 || !val) return "";
        let strVal = Math.abs(val).toFixed(1);
        if(isSL) strVal = Math.abs(val); 
        if (val > 0) return `<span class="delta-badge pos" style="font-size:9px; margin-top:2px;">▲ +${strVal}</span>`;
        return `<span class="delta-badge neg" style="font-size:9px; margin-top:2px;">▼ -${strVal}</span>`;
    };


    async function getHistoryForDate(dateVal) {
        if (!dateVal || dateVal === 'auto' || dateVal === 'current') return null;
        let queryDate = window.dateMapYMD && window.dateMapYMD[dateVal] ? window.dateMapYMD[dateVal] : dateVal;
        if (!window.historyDataCache[dateVal]) {
            try {
                const res = await fetch(GAS_URL + "?action=getHistoryData&date=" + encodeURIComponent(queryDate));
                window.historyDataCache[dateVal] = await res.json();
            } catch (e) {
                console.error("Lỗi lấy data lịch sử:", e);
                return null;
            }
        }
        return window.historyDataCache[dateVal];
    }

    async function initHistory() {
        if (window.availableDates.length > 0) return; 
        try {
            const res = await fetch(GAS_URL + "?action=getHistoryDates");
            const rawDates = await res.json();
            
            function toYMD(d) {
                if (!d) return null;
                let dt = new Date(d);
                if (isNaN(dt.getTime())) return String(d);
                let y = dt.getFullYear();
                let m = String(dt.getMonth() + 1).padStart(2, '0');
                let day = String(dt.getDate()).padStart(2, '0');
                return y + '-' + m + '-' + day;
            }

            let validDates = [];
            let seenYMD = new Set();
            if (Array.isArray(rawDates)) {
                let sortedDates = rawDates.slice().sort((a, b) => {
                    let da = new Date(a); let db = new Date(b);
                    if (isNaN(da) || isNaN(db)) return String(b).localeCompare(String(a));
                    return db - da;
                });
                sortedDates.forEach(d => {
                    let ymd = String(d).length > 10 ? toYMD(d) : d;
                    if (ymd && !seenYMD.has(ymd)) {
                        seenYMD.add(ymd);
                        validDates.push({ orig: d, ymd: ymd });
                    }
                });
            }
            
            window.availableDates = validDates.map(item => item.orig);
            window.dateMapYMD = {};
            validDates.forEach(item => window.dateMapYMD[item.orig] = item.ymd);
            console.log("[NV] Available dates:", window.availableDates);

            let baseSel = document.getElementById('baseDateSel');
            let compSel = document.getElementById('compDateSel');
            if(!baseSel || !compSel) return;

            let htmlBase = '<option value="auto">Tự động (Hôm trước)</option>';
            let htmlComp = '<option value="current">Hiện tại (Mới nhất)</option>';
            
            window.availableDates.forEach(function(d) {
                let ymd = window.dateMapYMD[d] || d;
                let parts = ymd.split('-');
                let display = parts.length === 3 ? parts[2]+'/'+parts[1]+'/'+parts[0] : ymd;
                htmlBase += `<option value="${d}">${display}</option>`;
                htmlComp += `<option value="${d}">${display}</option>`;
            });
            
            baseSel.innerHTML = htmlBase;
            compSel.innerHTML = htmlComp;
        } catch(e) { 
            console.error("Lỗi initHistory:", e); 
        }
    }

    function renderNhanVienSkeletons() {
        const tableHTML = `
            <div style="padding: 20px;">
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-text" style="height: 30px; margin-bottom: 12px; width: 100%;"></div>
                <div class="skeleton skeleton-text" style="height: 30px; margin-bottom: 12px; width: 100%;"></div>
                <div class="skeleton skeleton-text" style="height: 30px; margin-bottom: 12px; width: 100%;"></div>
                <div class="skeleton skeleton-text" style="height: 30px; width: 100%;"></div>
            </div>
        `;
        const container1 = document.getElementById('thi-dua-tables-container');
        if (container1) container1.innerHTML = tableHTML;

        const gridHTML = Array(6).fill(0).map(() => `
            <div class="perf-card skeleton" style="min-height: 250px; border-radius: 12px; background: var(--bg-panel); margin-bottom: 16px; padding: 16px; box-shadow: var(--shadow-sm);">
                <div class="skeleton-title" style="width: 50%; height: 20px;"></div>
                <div class="skeleton-text" style="width: 80%; height: 14px; margin-top: 10px;"></div>
                <div class="skeleton-text" style="width: 100%; height: 10px; margin-top: 20px;"></div>
                <div class="skeleton-text" style="width: 100%; height: 10px; margin-top: 8px;"></div>
                <div class="skeleton-text" style="width: 70%; height: 10px; margin-top: 8px;"></div>
            </div>
        `).join('');
        const container2 = document.getElementById('performance-grid');
        if (container2) {
            container2.innerHTML = `<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; width: 100%;">${gridHTML}</div>`;
        }
    }

    async function loadData() {
        try {
            const btn = document.getElementById('btnSend');
            if (btn) btn.innerText = "⏳ Đang tổng hợp Big Data NV...";

            const formatValLocal = (val, isSL) => isSL ? Math.round(val).toLocaleString('vi-VN') : formatMoney(val);

            // Render skeletons immediately
            renderNhanVienSkeletons();
            setHTML("cache-status", `(⏳ Đang tải dữ liệu trực tiếp từ Google Sheet...)`);

            // Start fetches in parallel
            const historyPromise = initHistory();
            const mainFetchPromise = fetch(GAS_URL + "?sheets=Config_ThiDua,Data_NV_BI,Data_NV_ThiDua,Data_BI,Data_ThiDua");

            await historyPromise;

            let baseVal = document.getElementById('baseDateSel') ? document.getElementById('baseDateSel').value : 'auto';
            let compVal = document.getElementById('compDateSel') ? document.getElementById('compDateSel').value : 'current';

            let dataNV_BI, dataThiDua, dataStore_BI, dataStore_ThiDua, dataConfig;

            const res = await mainFetchPromise;
            const fromCache = res.headers.get('X-From-Cache') === 'true';
            const currentData = await res.json();
        
        if (fromCache) {
            setHTML("cache-status", `(⚡ Dữ liệu lưu cục bộ)`);
        } else {
            let updateTime = new Date().toLocaleTimeString('vi-VN') + " - " + new Date().toLocaleDateString('vi-VN');
            setHTML("cache-status", `(Vừa cập nhật mới lúc: ${updateTime})`);
        }

        dataConfig = currentData["Config_ThiDua"] || [];

        if (compVal === 'current') {
            dataNV_BI = currentData["Data_NV_BI"] || [];
            dataThiDua = currentData["Data_NV_ThiDua"] || [];
            dataStore_BI = currentData["Data_BI"] || [];
            dataStore_ThiDua = currentData["Data_ThiDua"] || [];
        } else {
            let hData = await getHistoryForDate(compVal);
            dataNV_BI = hData["Data_NV_BI"] || [];
            dataThiDua = hData["Data_NV_ThiDua"] || [];
            dataStore_BI = hData["Data_BI"] || [];
            dataStore_ThiDua = hData["Data_ThiDua"] || [];
        }

        let actualBaseDate = baseVal;
        if (baseVal === 'auto') {
            let dates = window.availableDates;
            if (dates.length > 0) {
                // Lấy ngày hôm nay theo định dạng yyyy-MM-dd
                let now = new Date();
                let todayYMD = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
                
                if (compVal === 'current') {
                    // Nếu ngày mới nhất là hôm nay, bỏ qua và lấy ngày trước đó
                    let d0_ymd = window.dateMapYMD && window.dateMapYMD[dates[0]] ? window.dateMapYMD[dates[0]] : dates[0];
                    if (d0_ymd === todayYMD) {
                        actualBaseDate = dates.length > 1 ? dates[1] : null;
                    } else {
                        actualBaseDate = dates[0];
                    }
                } else {
                    let idx = dates.indexOf(compVal);
                    if (idx >= 0 && idx < dates.length - 1) {
                        actualBaseDate = dates[idx + 1];
                    } else {
                        actualBaseDate = null;
                    }
                }
            } else {
                actualBaseDate = null;
            }
        }
        console.log("[NV] Final actualBaseDate:", actualBaseDate);


        console.log("[NV] availableDates:", window.availableDates);
        console.log("[NV] baseVal:", baseVal, "compVal:", compVal, "actualBaseDate:", actualBaseDate);
        
        let baseUserMap = {};
        if (actualBaseDate) {
            console.log("[NV] Fetching history for:", actualBaseDate);
            let hBase = await getHistoryForDate(actualBaseDate);
            
            if (baseVal === 'auto' && (!hBase || !hBase["Data_NV_ThiDua"] || hBase["Data_NV_ThiDua"].length === 0)) {
                console.warn("[NV] Lịch sử ngày " + actualBaseDate + " thiếu Data_NV_ThiDua, tìm ngày cũ hơn...");
                let dates = window.availableDates;
                let startIndex = dates.indexOf(actualBaseDate);
                let originalDate = actualBaseDate;
                if (startIndex >= 0) {
                    for (let i = startIndex + 1; i < dates.length; i++) {
                        let fallbackDate = dates[i];
                        let hFallback = await getHistoryForDate(fallbackDate);
                        if (hFallback && hFallback["Data_NV_ThiDua"] && hFallback["Data_NV_ThiDua"].length > 0) {
                            console.log("[NV] Đã tìm thấy lịch sử hợp lệ ở ngày:", fallbackDate);
                            actualBaseDate = fallbackDate; 
                            hBase = hFallback;
                            
                            let warnEl = document.getElementById('history-warning');
                            if (!warnEl) {
                                warnEl = document.createElement('div');
                                warnEl.id = 'history-warning';
                                warnEl.style = "background: #fffbeb; color: #b45309; padding: 10px; border-radius: 8px; font-weight: 800; font-size: 13px; text-align: center; margin-bottom: 15px; border: 2px solid #fde68a;";
                                let rbox = document.querySelector('.report-box');
                                if(rbox) rbox.prepend(warnEl);
                            }

            card: card,
            width: card.style.width,
            flex: card.style.flex
        }));

        // Calculate temporary row sizes based on card count
        let n = cards.length;
        let rowSizes = [];
        if (n <= 4) {
            rowSizes = [n];
        } else {
            let q = Math.floor(n / 4);
            let rem = n % 4;
            
            if (rem === 0) {
                rowSizes = Array(q).fill(4);
            } else if (rem === 3) {
                rowSizes = Array(q).fill(4).concat([3]);
            } else if (rem === 2) {
                if (q === 1) {
                    rowSizes = [3, 3];
                } else {
                    rowSizes = Array(q).fill(4).concat([2]);
                }
            } else if (rem === 1) {
                if (q === 1) {
                    rowSizes = [3, 2];
                } else if (q === 2) {
                    rowSizes = [3, 3, 3];
                } else {
                    rowSizes = Array(q - 2).fill(4).concat([3, 3, 3]);
                }
            }

        grid.style.flexDirection = 'column';
        grid.style.gap = '15px';
        grid.style.width = '100%';

            part1.style.width = (table.offsetWidth + 60) + "px";
        }

        hiddenCells.forEach(item => {
            item.cell.style.display = item.display;
        });
        part1.style.width = originalWidth;
        
        downloadURI(dataUrl, "3_XepHang_RutGon.png");
        this.innerText = btnText; this.disabled = false;
    });

    }

    window.monthHistoryCache = {};
    async function getMonthHistory(targetDate) {
        targetDate = targetDate || new Date();
        let monthStr = targetDate.getFullYear() + '-' + String(targetDate.getMonth()+1).padStart(2,'0');
        if (!window.monthHistoryCache[monthStr]) {
            try {
                let res = await fetch(GAS_URL + "?action=getHistoryMonthData&month=" + monthStr);
                window.monthHistoryCache[monthStr] = await res.json();
            } catch(e) {
                console.error("Lỗi lấy lịch sử tháng", e);
                return {};
            }
        }
        return window.monthHistoryCache[monthStr];
    }

    window.showCategoryModal = async function(catIndex) {
        try {
            let cat = window.g_activeCategories[catIndex];
            if (!cat) return;
            
            let nganhClean = String(cat.nganhHang).toLowerCase().trim();
            let html = `
            <div style="padding: 10px; width: 100%; box-sizing: border-box; overflow: hidden; background: white;">
                <table style="width: 100%; border-collapse: collapse; font-family: 'Nunito', sans-serif; font-size: 13px;">
                    <thead style="background: white;">
                        <tr>
                            <th style="padding: 6px 4px; border-bottom: 2px solid #e2e8f0; text-align: center; font-weight: 800; color: #334155; width: 8%;">Hạng</th>
                            <th style="padding: 6px 4px; border-bottom: 2px solid #e2e8f0; text-align: left; font-weight: 800; color: #334155; width: 32%;">Nhân viên</th>
                            <th style="padding: 6px 4px; border-bottom: 2px solid #e2e8f0; text-align: center; font-weight: 800; color: #334155; width: 15%;">Lũy kế</th>
                            <th style="padding: 6px 4px; border-bottom: 2px solid #e2e8f0; text-align: center; font-weight: 800; color: #334155; width: 15%;">Target</th>
                            <th style="padding: 6px 4px; border-bottom: 2px solid #e2e8f0; text-align: center; font-weight: 800; color: #334155; width: 15%;">% HT</th>
                            <th style="padding: 6px 4px; border-bottom: 2px solid #e2e8f0; text-align: center; font-weight: 800; color: #334155; width: 15%;">% HT Dự kiến</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            let tdList = [];
            for (let emp of window.g_tdEmployees) {
                let u = emp.u;
                let actual = u.td[nganhClean] || 0;
                let targetUser = cat.storeTarget * u.targetRatio;
                let htHT = targetUser > 0 ? (actual / targetUser) : 0;
                let htDuKien = targetUser > 0 ? ((actual / window.g_daysPassed) * window.g_daysInMonth) / targetUser : 0;
                if (targetUser > 0 || actual > 0) {
                    tdList.push({ name: emp.name, actual, targetUser, htHT, htDuKien, u, userId: emp.userId });
                }
            }
            let selectedDateStr = document.getElementById('filterDate') ? document.getElementById('filterDate').value : 'current';
            let today = new Date();
            let isCurrentDay = true;
            if (selectedDateStr && selectedDateStr !== 'current' && selectedDateStr !== 'auto') {
                let parts = selectedDateStr.split('/');
                if (parts.length >= 2) {
                    let parsedDate = new Date(parts.length===3 ? parts[2] : today.getFullYear(), parseInt(parts[1])-1, parts[0]);
                    if (parsedDate.toDateString() !== today.toDateString()) {
                        today = parsedDate;
                        isCurrentDay = false;
                    }
                }
            }

            let isFirstDay = today.getDate() === 1;
            let targetDate = isFirstDay ? new Date(today.getFullYear(), today.getMonth(), 0) : today;
            let currentMonth = targetDate.getMonth() + 1;
            let currentYear = targetDate.getFullYear();
            let daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
            
            let limitDay;
            if (isFirstDay) {
                limitDay = daysInMonth;
            } else {
                limitDay = isCurrentDay ? today.getDate() - 1 : today.getDate();
            }

            let hist = await getMonthHistory(targetDate);
            let dates = Object.keys(hist).sort();

            for (let p of tdList) {
                let uId = String(p.userId).trim();
                let cumulativeArr = [];
                for(let d of dates) {
                    let dData = hist[d]["Data_NV_ThiDua"];
                    if(dData) {
                        let row = dData.find(x => String(getKey(x, "staffuser", "mã nv", "employeeid", "user", "mã nhân viên")).trim() == uId && String(getKey(x, "programname", "nhóm ngành hàng", "nhóm ngành hàng chính")).toLowerCase().trim() == nganhClean);
                        let val = row ? parseVnNumber(getKey(row, "value_compe", "thực hiện", "đã bán")) : (cumulativeArr.length > 0 ? cumulativeArr[cumulativeArr.length-1].val : 0);
                        cumulativeArr.push({date: d, val: val});
                    }
                }
                
                if (!isFirstDay && !isCurrentDay) {
                    let viewDateStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
                    if (!cumulativeArr.find(x => x.date === viewDateStr)) {
                        cumulativeArr.push({date: viewDateStr, val: p.actual});
                    } else {
                        cumulativeArr.find(x => x.date === viewDateStr).val = p.actual;
                    }
                }
                
                let dailyMap = {};
                for(let i=0; i<cumulativeArr.length; i++) {
                    let dayNum = parseInt(cumulativeArr[i].date.split('-')[2]);
                    let val = 0;
                    if (i === 0) {
                        val = (dayNum === 1) ? cumulativeArr[i].val : 0;
                    } else {
                        val = Math.max(0, cumulativeArr[i].val - cumulativeArr[i-1].val);
                    }
                    dailyMap[dayNum] = val;
                }
                
                let fullLabels = [];
                let fullDailyData = [];
    
                for (let i = 1; i <= limitDay; i++) {
                    fullLabels.push(i + '/' + currentMonth);
                    fullDailyData.push(dailyMap[i] !== undefined ? dailyMap[i] : 0);
                }
                
                p.fullDailyData = fullDailyData;
                p.fullLabels = fullLabels;

                let zeroCount = 0;
                for(let i = fullDailyData.length - 1; i >= 0; i--) {
                    if (fullDailyData[i] <= 0) zeroCount++;
                    else break;
                }
                p.zeroCount = zeroCount;
            }

            tdList.sort((a, b) => b.htHT - a.htHT);
            window.currentTdList = tdList;
            
            let stt = 1;
            for (let p of tdList) {
                let realName = window.formatShortName(p.name);
                let colorHT = p.htHT >= 1 ? '#10b981' : '#ef4444';
                let colorDK = p.htDuKien >= 1 ? '#10b981' : '#ef4444';
                
                let warnHtml = "";
                if (p.zeroCount >= 7) {
                    warnHtml = `<span style="background: #fee2e2; color: #ef4444; font-size: 10px; padding: 2px 4px; border-radius: 4px; margin-left: 4px; font-weight: 900;" title="Số ngày liên tiếp chưa bán">⏳ ${p.zeroCount}</span>`;
                } else if (p.zeroCount >= 3) {
                    warnHtml = `<span style="background: #fef08a; color: #ca8a04; font-size: 10px; padding: 2px 4px; border-radius: 4px; margin-left: 4px; font-weight: 900;" title="Số ngày liên tiếp chưa bán">⏳ ${p.zeroCount}</span>`;
                }

                html += `
                <tr style="background: white; border-bottom: 1px solid #f1f5f9;">
                    <td style="padding: 6px 4px; text-align: center; font-weight: 800; color: #1e293b;">${stt++}</td>
                    <td style="padding: 6px 4px; text-align: left; font-weight: 600; color: #475569; white-space: nowrap; cursor:pointer;" onclick="showEmpChart(${stt-2}, ${cat.isSL})">${realName}${warnHtml}</td>
                    <td style="padding: 6px 4px; text-align: center; color: #64748b;">${window.g_formatVal(p.actual, cat.isSL)}</td>
                    <td style="padding: 6px 4px; text-align: center; color: #64748b;">${window.g_formatVal(p.targetUser, cat.isSL)}</td>
                    <td style="padding: 6px 4px; text-align: center; font-weight: 800; color: ${colorHT};">${window.g_formatPercent(p.htHT)}</td>
                    <td style="padding: 6px 4px; text-align: center; font-weight: 800; color: ${colorDK};">${window.g_formatPercent(p.htDuKien)}</td>
                </tr>
                `;
            }
            html += `</tbody></table></div>`;
            
            document.getElementById("infoModalContentBox").style.width = "750px";
            document.getElementById("infoModalContentBox").style.maxWidth = "95vw";
            document.getElementById("infoModalContentBox").style.height = "auto";
            document.getElementById("infoModalContentBox").style.maxHeight = "95vh";

            let mTitle = document.getElementById("infoModalTitle");
            mTitle.innerText = "Xếp hạng Ngành hàng: " + cat.nganhHang;
            mTitle.parentElement.style.background = "white";
            mTitle.parentElement.style.color = "#0284c7";
            mTitle.parentElement.style.textTransform = "none";
            mTitle.parentElement.style.borderBottom = "1px solid #e2e8f0";
            mTitle.parentElement.style.padding = "10px 15px";
            mTitle.parentElement.querySelector('button').style.color = "#94a3b8";

            let modalBody = document.getElementById("infoModalBody");
            modalBody.innerHTML = html;
            modalBody.style.overflow = "hidden"; // Không cho phép cuộn
            
            let modal = document.getElementById("infoModal");
            modal.style.display = "flex";
            
            setTimeout(() => { 
                modal.style.opacity = "1"; 
                document.getElementById("infoModalContentBox").style.transform = "translateY(0)"; 
                
                // Thuật toán ép kích thước Scale cho bảng nếu quá cao
                let table = modalBody.querySelector("table");
                if (table) {
                    let availableHeight = window.innerHeight * 0.95 - mTitle.parentElement.offsetHeight - 20; // 20px padding trừ hao
                    let tblH = table.offsetHeight;
                    if (tblH > availableHeight) {
                        modalBody.style.zoom = (availableHeight / tblH) * 0.98; // Ép fit height
                    } else {
                        modalBody.style.zoom = "1";
                    }
                }
            }, 50);
        } catch (e) {
            console.error("Lỗi showCategoryModal", e);
        }
    };
